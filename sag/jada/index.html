<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Jada Game</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/x-icon" href="/assets/gamecontroller.png">
</head>
<body>
  <header>
    <nav>
      <strong>Olin Gilster</strong>
      <div>
        <a href="/">Home</a>
        <a href="/experience/">Experience</a>
        <a href="/projects/">Projects</a>
        <a href="/blog/">Blog</a>
      </div>
    </nav>
  </header>

  <main class="game-shell">
    <section class="game-card">
      <div class="game-header">
        <h1>Jada Dogs</h1>
        <button id="focusButton">Focus Game</button>
      </div>

      <p class="game-instructions">
        Take care of Jada by feeding her, giving her water, and playing with her. Keep her happiness above 0.
        Move with <strong>WASD</strong> or <strong>arrow keys</strong>. Press <strong>E</strong>
        while standing in an interaction zone. Click "Focus Game" to allow WASD to move Jada.
      </p>

      <canvas id="gameCanvas" width="1000" height="620"></canvas>
    </section>
  </main>

  <script src="/js/jadafuncs.js"></script>
</body>
</html>
