<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sushi Tycoon</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/x-icon" href="/assets/gamecontroller.png">
</head>
<body>
  <header>
    <nav>
      <strong>Olin Gilster</strong>
      <div>
        <a href="/">Home</a>
        <a href="/experience/">Experience</a>
        <a href="/projects/">Projects</a>
        <a href="/blog/">Blog</a>
      </div>
    </nav>
  </header>

  <main class="game-shell">
    <section class="game-card">
      <div class="game-header">
        <h1>Sushi Tycoon</h1>
        <button id="focusButton">Start Game</button>
      </div>

      <p class="game-instructions">
        Move with <strong>WASD</strong> or <strong>arrow keys</strong>. Stand on a machine pad and press
        <strong>E</strong> to buy it. Machines are on the left side, and the restaurant tables are on the right.
      </p>

      <span id="moneyValue" hidden aria-hidden="true">0</span>
      <canvas id="gameCanvas" width="1000" height="620"></canvas>
    </section>
  </main>

  <script src="/js/tycoonfuncs.js?v=2"></script>
</body>
</html>
